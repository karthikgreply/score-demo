apiVersion: v1
kind: Service
metadata:
  name: score-demo-service
  namespace: default
  annotations:
    # Optional: If you want the service itself to provision a classic ELB/NLB.
    # We are using an Ingress for ALB, so NodePort or ClusterIP is preferred.
    # service.beta.kubernetes.io/aws-load-balancer-type: "external"
spec:
  type: NodePort # Better to use NodePort/ClusterIP when paired with AWS ALB Ingress Controller
  selector:
    app: score-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: score-demo-ingress
  namespace: default
  annotations:
    # Requires AWS Load Balancer Controller to be installed in the EKS cluster
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:xxxx:certificate/xxxx # Un-comment to enable HTTPS
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/scorecards
            pathType: Prefix
            backend:
              service:
                name: score-demo-service
                port:
                  number: 80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: score-demo
  namespace: default
  labels:
    app: score-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: score-demo
  template:
    metadata:
      labels:
        app: score-demo
    spec:
      containers:
        - name: score-demo
          # Update this with your actual ECR repository URI
          image: 801390778330.dkr.ecr.us-east-2.amazonaws.com/score-demo-repo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFKA_USERNAME
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFKA_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20